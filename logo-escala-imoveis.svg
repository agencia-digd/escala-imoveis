<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" fill="none">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;display=swap');</style>

    <!-- Glow atrás das barras -->
    <radialGradient id="iconGlow" cx="50%" cy="100%" r="100%">
      <stop offset="0%" stop-color="#0052CC" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#001833" stop-opacity="0"/>
    </radialGradient>

    <!-- Brilho no topo da barra ciano -->
    <radialGradient id="peakGlow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#48D8F0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Halo sutil atrás do ícone -->
  <ellipse cx="29" cy="50" rx="34" ry="18" fill="url(#iconGlow)"/>

  <!-- ===== ÍCONE: 3 edifícios em escada (escala = staircase) ===== -->

  <!-- Barra 1 — curta, azul escuro -->
  <rect x="6" y="34" width="11" height="14" rx="2.5" fill="#003D99"/>

  <!-- Barra 2 — média, azul médio -->
  <rect x="21" y="22" width="11" height="26" rx="2.5" fill="#0066BB"/>

  <!-- Barra 3 — alta, ciano -->
  <rect x="36" y="8" width="11" height="40" rx="2.5" fill="#00B4D8"/>
  <!-- Reflexo no topo da barra ciano -->
  <rect x="36" y="8" width="11" height="14" rx="2.5" fill="url(#peakGlow)" opacity="0.5"/>

  <!-- Linha de tendência conectando os topos (growth trend) -->
  <polyline
    points="11.5,34 26.5,22 41.5,8"
    stroke="rgba(255,255,255,0.2)"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-dasharray="2,3"
    fill="none"/>

  <!-- Indicador de pico no topo -->
  <circle cx="41.5" cy="8" r="5" fill="#00B4D8" opacity="0.18"/>
  <circle cx="41.5" cy="8" r="3" fill="#48D8F0"/>

  <!-- Separador vertical -->
  <line x1="60" y1="12" x2="60" y2="44"
    stroke="rgba(255,255,255,0.09)" stroke-width="1"/>

  <!-- ===== WORDMARK ===== -->

  <!-- ESCALA — branco, bold, grande -->
  <text
    x="70" y="36"
    font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="27"
    letter-spacing="-1"
    fill="#FFFFFF">ESCALA</text>

  <!-- IMÓVEIS — ciano, espaçado, menor -->
  <text
    x="72" y="50"
    font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif"
    font-weight="700"
    font-size="10"
    letter-spacing="4"
    fill="#00B4D8">IMÓVEIS</text>
</svg>
